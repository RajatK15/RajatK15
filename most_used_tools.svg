<svg width="480" height="255" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="topAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#e34c26"/>
      <stop offset="30%"  style="stop-color:#3572A5"/>
      <stop offset="60%"  style="stop-color:#F2C811"/>
      <stop offset="80%"  style="stop-color:#1f77b4"/>
      <stop offset="100%" style="stop-color:#FF3621"/>
    </linearGradient>
    <linearGradient id="sqlGrad"  x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#e34c26"/>
      <stop offset="100%" style="stop-color:#ff6b47"/>
    </linearGradient>
    <linearGradient id="pyGrad"   x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#3572A5"/>
      <stop offset="100%" style="stop-color:#4d8fc4"/>
    </linearGradient>
    <linearGradient id="pbiGrad"  x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#F2C811"/>
      <stop offset="100%" style="stop-color:#f7d84a"/>
    </linearGradient>
    <linearGradient id="tabGrad"  x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#1f77b4"/>
      <stop offset="100%" style="stop-color:#3a95d4"/>
    </linearGradient>
    <linearGradient id="dbGrad"   x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#FF3621"/>
      <stop offset="100%" style="stop-color:#ff5a42"/>
    </linearGradient>
  </defs>

  <!-- Card Background -->
  <rect width="480" height="255" rx="13" ry="13" fill="#0d1117"/>
  <rect width="480" height="255" rx="13" ry="13" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Top gradient accent -->
  <rect x="0"   y="0" width="480" height="4" rx="0" fill="url(#topAccent)"/>
  <rect x="0"   y="0" width="13"  height="4" rx="0" fill="#e34c26"/>
  <rect x="467" y="0" width="13"  height="4" rx="0" fill="#FF3621"/>

  <!-- Title -->
  <text x="22" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#e6edf3" letter-spacing="0.3">Most Used Tools &amp; Languages</text>

  <!-- Divider -->
  <line x1="22" y1="42" x2="458" y2="42" stroke="#21262d" stroke-width="1"/>

  <!-- ── ROW 1: SQL · Expert ── -->
  <circle cx="30" cy="68" r="5" fill="#e34c26"/>
  <text x="42" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="600" fill="#c9d1d9">SQL</text>
  <rect x="140" y="62" width="255" height="12" rx="6" fill="#21262d"/>
  <rect x="140" y="62" width="102" height="12" rx="6" fill="url(#sqlGrad)"/>
  <!-- EXPERT badge -->
  <rect x="408" y="58" width="52" height="20" rx="10" fill="#e34c2620" stroke="#e34c26" stroke-width="1"/>
  <text x="434" y="71" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#e34c26" text-anchor="middle" letter-spacing="0.5">EXPERT</text>

  <!-- ── ROW 2: Python · Advanced ── -->
  <circle cx="30" cy="106" r="5" fill="#3572A5"/>
  <text x="42" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="600" fill="#c9d1d9">Python</text>
  <rect x="140" y="100" width="255" height="12" rx="6" fill="#21262d"/>
  <rect x="140" y="100" width="76"  height="12" rx="6" fill="url(#pyGrad)"/>
  <!-- ADVANCED badge -->
  <rect x="404" y="96" width="60" height="20" rx="10" fill="#3572A520" stroke="#3572A5" stroke-width="1"/>
  <text x="434" y="109" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#3572A5" text-anchor="middle" letter-spacing="0.5">ADVANCED</text>

  <!-- ── ROW 3: Power BI · Proficient ── -->
  <circle cx="30" cy="144" r="5" fill="#F2C811"/>
  <text x="42" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="600" fill="#c9d1d9">Power BI</text>
  <rect x="140" y="138" width="255" height="12" rx="6" fill="#21262d"/>
  <rect x="140" y="138" width="38"  height="12" rx="6" fill="url(#pbiGrad)"/>
  <!-- PROFICIENT badge -->
  <rect x="399" y="134" width="68" height="20" rx="10" fill="#F2C81120" stroke="#F2C811" stroke-width="1"/>
  <text x="433" y="147" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#F2C811" text-anchor="middle" letter-spacing="0.5">PROFICIENT</text>

  <!-- ── ROW 4: Tableau · Proficient ── -->
  <circle cx="30" cy="182" r="5" fill="#1f77b4"/>
  <text x="42" y="186" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="600" fill="#c9d1d9">Tableau</text>
  <rect x="140" y="176" width="255" height="12" rx="6" fill="#21262d"/>
  <rect x="140" y="176" width="25"  height="12" rx="6" fill="url(#tabGrad)"/>
  <!-- PROFICIENT badge -->
  <rect x="399" y="172" width="68" height="20" rx="10" fill="#1f77b420" stroke="#1f77b4" stroke-width="1"/>
  <text x="433" y="185" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#1f77b4" text-anchor="middle" letter-spacing="0.5">PROFICIENT</text>

  <!-- ── ROW 5: Databricks · Familiar ── -->
  <circle cx="30" cy="220" r="5" fill="#FF3621"/>
  <text x="42" y="224" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="600" fill="#c9d1d9">Databricks</text>
  <rect x="140" y="214" width="255" height="12" rx="6" fill="#21262d"/>
  <rect x="140" y="214" width="13"  height="12" rx="6" fill="url(#dbGrad)"/>
  <!-- FAMILIAR badge -->
  <rect x="406" y="210" width="56" height="20" rx="10" fill="#FF362120" stroke="#FF3621" stroke-width="1"/>
  <text x="434" y="223" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FF3621" text-anchor="middle" letter-spacing="0.5">FAMILIAR</text>

  <!-- Footer -->
  <line x1="22" y1="238" x2="458" y2="238" stroke="#21262d" stroke-width="1"/>
  <text x="22"  y="251" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#484f58">Rajat Khandelwal · Data Analyst</text>
  <text x="458" y="251" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#484f58" text-anchor="end">github.com/RajatK15</text>
</svg>
